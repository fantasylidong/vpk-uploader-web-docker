services:
  uploader:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_SECRET=replace-with-a-long-random-string
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - MAX_UPLOAD_MB=1024
      - DEFAULT_GUEST_TTL_HOURS=24
      - PUBLIC_BASE_URL=http://localhost:8080
      - INSTANCE_NAME=${INSTANCE_NAME:-本机节点}
      - FEDERATION_API_TOKEN=${FEDERATION_API_TOKEN:-}
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./rules.yml:/app/rules.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
