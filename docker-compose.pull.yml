services:
  uploader:
    image: ${DOCKER_IMAGE:-yourdockerhubname/vpk-uploader:latest}
    ports:
      - "8080:8080"
    environment:
      - APP_SECRET=${APP_SECRET:?set-a-long-random-secret}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin123}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-1024}
      - MAX_TOTAL_UPLOAD_MB=${MAX_TOTAL_UPLOAD_MB:-0}
      - DEFAULT_GUEST_TTL_HOURS=${DEFAULT_GUEST_TTL_HOURS:-24}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-VPK Uploader}
      - FEDERATION_API_TOKEN=${FEDERATION_API_TOKEN:-}
      - FEDERATION_ALLOWED_CIDRS=${FEDERATION_ALLOWED_CIDRS:-}
      - LAN_REPLICATION_ENABLED=${LAN_REPLICATION_ENABLED:-1}
      - LAN_NODE_ID=${LAN_NODE_ID:-}
      - LAN_GROUP=${LAN_GROUP:-}
      - LAN_PEER_API_TOKEN=${LAN_PEER_API_TOKEN:-}
      - LAN_PEER_ALLOWED_CIDRS=${LAN_PEER_ALLOWED_CIDRS:-}
      - LAN_PEERS=${LAN_PEERS:-[]}
      - LAN_DISK_RESERVE_MB=${LAN_DISK_RESERVE_MB:-1024}
      - LAN_PEER_TLS_VERIFY=${LAN_PEER_TLS_VERIFY:-1}
      - LAN_ALLOW_PUBLIC_PEERS=${LAN_ALLOW_PUBLIC_PEERS:-0}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      # - ./rules.yml:/app/rules.yml:ro
    restart: unless-stopped
